# Identificação do projeto
sonar.projectKey=postech-blog-api
sonar.projectName=Postech Blog API
sonar.projectVersion=1.0.0

# Configuração de source
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Linguagem
sonar.language=js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusões
sonar.exclusions=**/node_modules/**,**/coverage/**,**/reports/**,**/*.test.js,**/*.spec.js
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/node_modules/**,src/server.js,src/infrastructure/swagger/**

# Duplicação
sonar.cpd.exclusions=**/*.test.js,**/*.spec.js

# Quality Gate
sonar.qualitygate.wait=true
