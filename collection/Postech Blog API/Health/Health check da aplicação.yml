info:
  name: Health check da aplicação
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Aplicação saudável
    request:
      url: "{{baseUrl}}/health"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "data": {
              "status": "",
              "timestamp": "",
              "uptime": 0,
              "database": ""
            }
          }
