info:
  name: Lista posts com paginação
  type: http
  seq: 2
  tags:
    - Posts

http:
  method: GET
  url: "{{baseUrl}}/posts?status=all&page=1&limit=10"
  params:
    - name: status
      value: draft
      type: query
      description: Filtrar por status (padrão retorna apenas published)
      disabled: true
    - name: status
      value: published
      type: query
      description: Filtrar por status (padrão retorna apenas published)
      disabled: true
    - name: status
      value: all
      type: query
      description: Filtrar por status (padrão retorna apenas published)
    - name: page
      value: "1"
      type: query
      description: Número da página
    - name: limit
      value: "10"
      type: query
      description: Itens por página
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Lista de posts
    request:
      url: "{{baseUrl}}/posts"
      method: GET
      params:
        - name: status
          value: draft
          type: query
          description: Filtrar por status (padrão retorna apenas published)
          disabled: true
        - name: status
          value: published
          type: query
          description: Filtrar por status (padrão retorna apenas published)
          disabled: true
        - name: status
          value: all
          type: query
          description: Filtrar por status (padrão retorna apenas published)
          disabled: true
        - name: page
          value: "1"
          type: query
          description: Número da página
        - name: limit
          value: "10"
          type: query
          description: Itens por página
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": [
              {
                "id": "",
                "titulo": "",
                "conteudo": "",
                "autor": "",
                "status": "draft",
                "createdAt": "",
                "updatedAt": ""
              }
            ],
            "pagination": {
              "page": 0,
              "limit": 0,
              "total": 0,
              "totalPages": 0
            }
          }
