info:
  name: Busca posts por palavra-chave
  type: http
  seq: 1
  tags:
    - Posts

http:
  method: GET
  url: "{{baseUrl}}/posts/search"
  params:
    - name: q
      value: ""
      type: query
      description: Termo de busca
    - name: page
      value: "1"
      type: query
      description: Número da página
    - name: limit
      value: "10"
      type: query
      description: Itens por página
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Posts encontrados
    request:
      url: "{{baseUrl}}/posts/search"
      method: GET
      params:
        - name: q
          value: ""
          type: query
          description: Termo de busca
        - name: page
          value: "1"
          type: query
          description: Número da página
        - name: limit
          value: "10"
          type: query
          description: Itens por página
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true,
            "data": [
              {
                "id": "",
                "titulo": "",
                "conteudo": "",
                "autor": "",
                "status": "draft",
                "createdAt": "",
                "updatedAt": ""
              }
            ],
            "pagination": {
              "page": 0,
              "limit": 0,
              "total": 0,
              "totalPages": 0
            }
          }
  - name: 400 Response
    description: Parâmetros inválidos
    request:
      url: "{{baseUrl}}/posts/search"
      method: GET
      params:
        - name: q
          value: ""
          type: query
          description: Termo de busca
        - name: page
          value: "1"
          type: query
          description: Número da página
        - name: limit
          value: "10"
          type: query
          description: Itens por página
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "error": {
              "message": "",
              "details": [
                {}
              ]
            }
          }
