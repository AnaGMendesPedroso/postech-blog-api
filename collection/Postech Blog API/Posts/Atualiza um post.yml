info:
  name: Atualiza um post
  type: http
  seq: 5
  tags:
    - Posts

http:
  method: PUT
  url: "{{baseUrl}}/posts/:id"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "titulo": "",
        "conteudo": "",
        "autor": "",
        "status": "draft"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Post atualizado
    request:
      url: "{{baseUrl}}/posts/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "titulo": "",
            "conteudo": "",
            "autor": "",
            "status": "draft"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "data": {
              "id": "",
              "titulo": "",
              "conteudo": "",
              "autor": "",
              "status": "draft",
              "createdAt": "",
              "updatedAt": ""
            }
          }
  - name: 404 Response
    description: Post não encontrado
    request:
      url: "{{baseUrl}}/posts/:id"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "titulo": "",
            "conteudo": "",
            "autor": "",
            "status": "draft"
          }
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
