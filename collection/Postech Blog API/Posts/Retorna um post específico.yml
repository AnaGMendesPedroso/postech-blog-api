info:
  name: Retorna um post específico
  type: http
  seq: 4
  tags:
    - Posts

http:
  method: GET
  url: "{{baseUrl}}/posts/:id"
  params:
    - name: id
      value: 69c073a47c90539fa596e882
      type: path
      description: ID do post
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Post encontrado
    request:
      url: "{{baseUrl}}/posts/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: ID do post
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "data": {
              "id": "",
              "titulo": "",
              "conteudo": "",
              "autor": "",
              "status": "draft",
              "createdAt": "",
              "updatedAt": ""
            }
          }
  - name: 404 Response
    description: Post não encontrado
    request:
      url: "{{baseUrl}}/posts/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: ID do post
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": false,
            "error": {
              "message": "",
              "details": [
                {}
              ]
            }
          }
