opencollection: 1.0.0

info:
  name: Postech Blog API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: before-request
      code: |-
        const { fakerPT_BR } = require('@faker-js/faker')

        const randomAutor = fakerPT_BR.person.fullName()
        const randomTitulo= fakerPT_BR.food.dish()
        const randomConteudo= fakerPT_BR.food.description()

        bru.setEnvVar("randomAutor", randomAutor)
        bru.setEnvVar("randomTitulo", randomTitulo)
        bru.setEnvVar("randomConteudo", randomConteudo)
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
